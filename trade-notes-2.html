<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeNotes</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
:root {
  --bg:#0e0e0e; --surface:#171717; --surface2:#1f1f1f; --border:#2a2a2a;
  --accent:#c8a96e; --text:#e8e8e8; --muted:#666; --danger:#c0392b; --radius:10px;
}
.light { --bg:#f5f5f0; --surface:#fff; --surface2:#efefea; --border:#ddd; --text:#111; --muted:#999; }
* { box-sizing:border-box; margin:0; padding:0; }
body { background:var(--bg); color:var(--text); font-family:system-ui,sans-serif; min-height:100vh; }

/* SETUP */
#setup { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:24px; gap:16px; }
#setup h1 { font-size:1.8rem; color:var(--accent); }
#setup p { color:var(--muted); font-size:.85rem; text-align:center; }
.setup-box { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:24px; width:100%; max-width:400px; display:flex; flex-direction:column; gap:12px; }
.setup-box label { font-size:.75rem; color:var(--muted); display:block; margin-bottom:3px; }
.setup-box input { width:100%; background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:9px 12px; border-radius:6px; font-size:.82rem; font-family:monospace; }

/* TOPBAR */
#topbar { display:flex; align-items:center; padding:0 14px; height:50px; background:var(--surface); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; gap:10px; }
.logo { font-size:.95rem; font-weight:700; color:var(--accent); flex-shrink:0; }
#back-btn { display:none; background:none; border:none; color:var(--accent); cursor:pointer; font-size:.82rem; align-items:center; gap:4px; flex-shrink:0; }
#back-btn.show { display:flex; }
#search-wrap { flex:1; position:relative; display:none; min-width:0; }
#search-wrap.show { display:block; }
#search-input { width:100%; background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:6px 12px 6px 30px; border-radius:20px; font-size:.82rem; }
#search-wrap svg { position:absolute; left:9px; top:50%; transform:translateY(-50%); width:13px; height:13px; color:var(--muted); pointer-events:none; }
.top-actions { display:flex; gap:8px; margin-left:auto; flex-shrink:0; }
.tbtn { background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:5px 10px; border-radius:6px; cursor:pointer; font-size:.78rem; display:flex; align-items:center; gap:4px; }
.tbtn:hover { border-color:var(--accent); color:var(--accent); }
#add-video-btn { display:none; }
#add-video-btn.show { display:flex; }

/* CONTENT */
#content { padding:18px 14px; }

/* CHANNELS */
#ch-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-top:14px; }
.ch-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:18px 14px; cursor:pointer; position:relative; transition:border-color .15s; }
.ch-card:hover { border-color:var(--accent); }
.ch-card .name { font-size:.95rem; font-weight:700; margin-bottom:4px; }
.ch-card .cnt { font-size:.72rem; color:var(--muted); }
.ch-del { position:absolute; top:8px; right:8px; background:none; border:none; color:var(--muted); cursor:pointer; font-size:.8rem; }
.ch-del:hover { color:var(--danger); }
.ch-add { background:transparent; border:2px dashed var(--border); border-radius:var(--radius); padding:18px 14px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; color:var(--muted); font-size:.85rem; width:100%; transition:border-color .15s,color .15s; }
.ch-add:hover { border-color:var(--accent); color:var(--accent); }

/* VIDEOS */
#v-grid { display:grid; grid-template-columns:1fr; gap:10px; margin-top:14px; }
.v-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px; cursor:pointer; transition:border-color .15s; display:flex; flex-direction:column; gap:8px; }
.v-card:hover { border-color:var(--accent); }
.v-thumb { width:100%; height:100px; border-radius:6px; background:var(--surface2); overflow:hidden; display:flex; align-items:center; justify-content:center; }
.v-thumb img { width:100%; height:100%; object-fit:cover; }
.v-title { font-size:.88rem; font-weight:600; }
.v-meta { display:flex; justify-content:space-between; }
.v-ch { font-size:.72rem; color:var(--accent); }
.v-date { font-size:.72rem; color:var(--muted); }
.tags { display:flex; flex-wrap:wrap; gap:4px; }
.tag { font-size:.65rem; padding:2px 7px; border-radius:10px; background:var(--surface2); color:var(--muted); border:1px solid var(--border); }
.v-preview { font-size:.76rem; color:var(--muted); line-height:1.4; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }

/* EMPTY */
.empty { text-align:center; padding:50px 20px; color:var(--muted); font-size:.85rem; }

/* SECTION TITLE */
.section-title { font-size:1rem; font-weight:700; }
.section-sub { font-size:.75rem; color:var(--muted); margin-top:2px; }

/* MODAL */
.modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,.78); z-index:200; align-items:flex-end; justify-content:center; padding:0; }
.modal-bg.open { display:flex; }
.modal { background:var(--surface); border-radius:16px 16px 0 0; width:100%; max-width:640px; max-height:92vh; overflow-y:auto; border-top:1px solid var(--border); }
.mhead { padding:16px 18px 12px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--surface); }
.mhead h3 { font-size:.92rem; font-weight:700; }
.mclose { background:none; border:none; color:var(--muted); font-size:1.4rem; cursor:pointer; line-height:1; }
.mbody { padding:16px 18px; display:flex; flex-direction:column; gap:14px; }
.mfooter { padding:12px 18px; border-top:1px solid var(--border); display:flex; gap:8px; justify-content:flex-end; }
.field label { font-size:.75rem; color:var(--muted); display:block; margin-bottom:4px; }
.field input,.field textarea,.field select { width:100%; background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:9px 12px; border-radius:6px; font-size:.86rem; font-family:system-ui,sans-serif; }
.field textarea { resize:vertical; min-height:140px; }
.field input:focus,.field textarea:focus,.field select:focus { outline:none; border-color:var(--accent); }

/* BUTTONS */
.btn { padding:8px 16px; border-radius:8px; font-size:.84rem; font-weight:600; cursor:pointer; border:none; }
.btn-primary { background:var(--accent); color:#111; }
.btn-ghost { background:var(--surface2); border:1px solid var(--border); color:var(--text); }
.btn-danger { background:var(--danger); color:#fff; }
.btn-sm { padding:5px 11px; font-size:.76rem; }
.btn:active { opacity:.8; }

/* IMAGES */
.imgs-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
.img-wrap { position:relative; border-radius:6px; overflow:hidden; }
.img-wrap img { width:100%; height:80px; object-fit:cover; display:block; cursor:zoom-in; }
.img-del { position:absolute; top:3px; right:3px; background:rgba(0,0,0,.65); border:none; color:#fff; border-radius:50%; width:20px; height:20px; font-size:.7rem; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.img-add { border:2px dashed var(--border); border-radius:6px; padding:12px; text-align:center; color:var(--muted); font-size:.78rem; cursor:pointer; display:block; }
.img-add input { display:none; }
.img-add:hover { border-color:var(--accent); }
.slabel { font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--muted); }

/* LIGHTBOX */
#lb { display:none; position:fixed; inset:0; background:rgba(0,0,0,.93); z-index:500; align-items:center; justify-content:center; }
#lb.open { display:flex; }
#lb img { max-width:95vw; max-height:95vh; border-radius:8px; }
#lb-close { position:fixed; top:14px; right:16px; background:none; border:none; color:#fff; font-size:1.8rem; cursor:pointer; }

/* TOAST */
#toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--surface); border:1px solid var(--accent); color:var(--text); padding:8px 18px; border-radius:20px; font-size:.8rem; z-index:999; opacity:0; pointer-events:none; transition:opacity .2s; white-space:nowrap; }
#toast.show { opacity:1; }

/* COLORS */
.color-row { display:flex; flex-wrap:wrap; gap:8px; }
.cdot { width:26px; height:26px; border-radius:50%; cursor:pointer; border:2px solid transparent; }
.cdot.sel,.cdot:hover { border-color:var(--text); }
.ssec { border-bottom:1px solid var(--border); padding:12px 0; }
.ssec:last-child { border-bottom:none; }
.ssec h4 { font-size:.72rem; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-bottom:10px; }
mark { background:var(--accent); color:#111; border-radius:2px; padding:0 2px; }
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <h1>TradeNotes</h1>
  <p>Firebase bilgilerini bir kez gir.</p>
  <div class="setup-box">
    <div><label>API Key</label><input id="s1" placeholder="AIzaSy..."></div>
    <div><label>Auth Domain</label><input id="s2" placeholder="xxx.firebaseapp.com"></div>
    <div><label>Project ID</label><input id="s3" placeholder="tradenotes-xxx"></div>
    <div><label>App ID</label><input id="s4" placeholder="1:xxx:web:xxx"></div>
    <button class="btn btn-primary" onclick="doInit()">Bağlan</button>
    <div id="setup-err" style="color:#e74c3c;font-size:.78rem;display:none"></div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <div id="topbar">
    <button id="back-btn" onclick="goChannels()">← Bölümler</button>
    <span class="logo">TradeNotes</span>
    <div id="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="search-input" placeholder="Ara..." oninput="doSearch(this.value)">
    </div>
    <div class="top-actions">
      <button class="tbtn" id="add-video-btn" onclick="openVideoModal()">+ Video</button>
      <button class="tbtn" onclick="openSettings()">⚙</button>
    </div>
  </div>

  <div id="content">
    <!-- CHANNELS VIEW -->
    <div id="view-ch">
      <div class="section-title">Bölümler</div>
      <div class="section-sub" id="ch-sub"></div>
      <div id="ch-grid"></div>
    </div>
    <!-- VIDEOS VIEW -->
    <div id="view-v" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div class="section-title" id="v-title"></div>
          <div class="section-sub" id="v-sub"></div>
        </div>
        <button class="btn btn-primary btn-sm" onclick="openVideoModal()">+ Video</button>
      </div>
      <div id="v-grid"></div>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lb" onclick="closeLb()">
  <button id="lb-close" onclick="closeLb()">✕</button>
  <img id="lb-img" src="" alt="">
</div>
<div id="toast"></div>

<!-- CHANNEL MODAL -->
<div class="modal-bg" id="ch-modal">
  <div class="modal">
    <div class="mhead">
      <h3>Bölüm Ekle</h3>
      <button class="mclose" onclick="closeM('ch-modal')">✕</button>
    </div>
    <div class="mbody">
      <div class="field">
        <label>Bölüm Adı</label>
        <input id="ch-input" placeholder="Örn: ICT, SMC Trader...">
      </div>
    </div>
    <div class="mfooter">
      <button class="btn btn-ghost" onclick="closeM('ch-modal')">İptal</button>
      <button class="btn btn-primary" id="ch-save-btn">Kaydet</button>
    </div>
  </div>
</div>

<!-- VIDEO MODAL -->
<div class="modal-bg" id="v-modal">
  <div class="modal">
    <div class="mhead">
      <h3 id="vm-title">Video Ekle</h3>
      <button class="mclose" onclick="closeM('v-modal')">✕</button>
    </div>
    <div class="mbody">
      <div class="field"><label>Video Başlığı *</label><input id="v-name" placeholder="Video adı..."></div>
      <div class="field"><label>Bölüm *</label><select id="v-ch-sel"></select></div>
      <div class="field"><label>YouTube Linki (thumbnail için)</label><input id="v-url" placeholder="https://youtube.com/watch?v=..."></div>
      <div class="field"><label>Etiketler (virgülle ayır)</label><input id="v-tags-in" placeholder="SMT, FVG, Entry..."></div>
    </div>
    <div class="mfooter">
      <button class="btn btn-ghost" onclick="closeM('v-modal')">İptal</button>
      <button class="btn btn-primary" id="v-save-btn">Kaydet</button>
    </div>
  </div>
</div>

<!-- NOTE MODAL -->
<div class="modal-bg" id="note-modal">
  <div class="modal">
    <div class="mhead">
      <h3 id="nm-title" style="max-width:65%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">—</h3>
      <div style="display:flex;gap:6px">
        <button class="btn btn-ghost btn-sm" id="nm-edit-btn">Düzenle</button>
        <button class="btn btn-danger btn-sm" id="nm-del-btn">Sil</button>
        <button class="mclose" onclick="closeM('note-modal')">✕</button>
      </div>
    </div>
    <div class="mbody">
      <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
        <span id="nm-ch" style="font-size:.75rem;color:var(--accent);font-weight:600"></span>
        <div id="nm-tags"></div>
      </div>
      <div>
        <div class="slabel" style="margin-bottom:8px">Görseller</div>
        <div class="imgs-grid" id="nm-imgs"></div>
        <label class="img-add" style="margin-top:8px">
          <input type="file" id="img-input" accept="image/*" multiple onchange="addImgs(this)">
          📎 Görsel ekle
        </label>
      </div>
      <div>
        <div class="slabel" style="margin-bottom:6px">Notlar</div>
        <textarea id="nm-text" placeholder="Notlarını buraya yaz..." oninput="schedSave()"></textarea>
      </div>
    </div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-bg" id="s-modal">
  <div class="modal" style="border-radius:16px 16px 0 0">
    <div class="mhead"><h3>Ayarlar</h3><button class="mclose" onclick="closeM('s-modal')">✕</button></div>
    <div class="mbody">
      <div class="ssec">
        <h4>Tema</h4>
        <div style="display:flex;gap:8px">
          <button class="btn btn-ghost btn-sm" onclick="setTheme('dark')">🌑 Koyu</button>
          <button class="btn btn-ghost btn-sm" onclick="setTheme('light')">☀️ Açık</button>
        </div>
      </div>
      <div class="ssec">
        <h4>Renk</h4>
        <div class="color-row" id="color-row"></div>
      </div>
      <div class="ssec">
        <h4>Bağlantı</h4>
        <button class="btn btn-danger btn-sm" onclick="resetFb()">Firebase Sıfırla</button>
      </div>
    </div>
  </div>
</div>

<script>
var db = null;
var channels = [];
var videos = [];
var activeCh = null;
var curVid = null;
var curImgs = [];
var saveTimer = null;

var COLORS = [
  '#c8a96e','#4ec9b0','#9b7fe8','#e07b6a','#6abf82','#7ba7c7','#d47fa0','#e8a835'
];

// INIT
function doInit() {
  var cfg = {
    apiKey:     document.getElementById('s1').value.trim(),
    authDomain: document.getElementById('s2').value.trim(),
    projectId:  document.getElementById('s3').value.trim(),
    appId:      document.getElementById('s4').value.trim()
  };
  var err = document.getElementById('setup-err');
  if (!cfg.apiKey || !cfg.projectId) {
    err.textContent = 'API Key ve Project ID zorunlu';
    err.style.display = 'block';
    return;
  }
  try {
    if (!firebase.apps.length) firebase.initializeApp(cfg);
    db = firebase.firestore();
    localStorage.setItem('tn-cfg', JSON.stringify(cfg));
    startApp();
  } catch(e) {
    err.textContent = 'Hata: ' + e.message;
    err.style.display = 'block';
  }
}

function tryAutoInit() {
  var saved = localStorage.getItem('tn-cfg');
  if (!saved) return false;
  try {
    var cfg = JSON.parse(saved);
    if (!firebase.apps.length) firebase.initializeApp(cfg);
    db = firebase.firestore();
    return true;
  } catch(e) { return false; }
}

function resetFb() {
  localStorage.removeItem('tn-cfg');
  location.reload();
}

function startApp() {
  document.getElementById('setup').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  applySettings();
  loadAll();
}

// LOAD
function loadAll() {
  db.collection('channels').get().then(function(cs) {
    channels = [];
    cs.forEach(function(d) { channels.push(Object.assign({id:d.id}, d.data())); });
    channels.sort(function(a,b){ return (a.name||'').localeCompare(b.name||''); });
    return db.collection('videos').get();
  }).then(function(vs) {
    videos = [];
    vs.forEach(function(d) { videos.push(Object.assign({id:d.id}, d.data())); });
    renderChannels();
  }).catch(function(e) { toast('Yükleme hatası: ' + e.message); });
}

// CHANNELS
function renderChannels() {
  document.getElementById('ch-sub').textContent = channels.length + ' bölüm';
  var html = '';
  channels.forEach(function(ch) {
    var cnt = videos.filter(function(v){ return v.channelId === ch.id; }).length;
    html += '<div class="ch-card" onclick="goVideos(\'' + ch.id + '\')">' +
      '<button class="ch-del" onclick="event.stopPropagation();delChannel(\'' + ch.id + '\')">✕</button>' +
      '<div class="name">' + esc(ch.name) + '</div>' +
      '<div class="cnt">' + cnt + ' video</div>' +
    '</div>';
  });
  html += '<button class="ch-add" onclick="openChModal()">+ Bölüm Ekle</button>';
  document.getElementById('ch-grid').innerHTML = html;
}

function goChannels() {
  activeCh = null;
  document.getElementById('view-ch').style.display = 'block';
  document.getElementById('view-v').style.display = 'none';
  document.getElementById('back-btn').classList.remove('show');
  document.getElementById('search-wrap').classList.remove('show');
  document.getElementById('add-video-btn').classList.remove('show');
  renderChannels();
}

function goVideos(chId) {
  activeCh = chId;
  document.getElementById('view-ch').style.display = 'none';
  document.getElementById('view-v').style.display = 'block';
  document.getElementById('back-btn').classList.add('show');
  document.getElementById('search-wrap').classList.add('show');
  document.getElementById('add-video-btn').classList.add('show');
  renderVideos();
}

// VIDEOS
function renderVideos(list) {
  var ch = channels.find(function(c){ return c.id === activeCh; });
  var items = list !== undefined ? list : videos.filter(function(v){ return v.channelId === activeCh; });
  document.getElementById('v-title').textContent = ch ? ch.name : '';
  document.getElementById('v-sub').textContent = items.length + ' video';
  if (!items.length) {
    document.getElementById('v-grid').innerHTML = '<div class="empty">Henüz video eklenmedi</div>';
    return;
  }
  var html = '';
  items.forEach(function(v) {
    var thumb = ytThumb(v.url);
    var tags = (v.tags||[]).slice(0,3).map(function(t){ return '<span class="tag">'+esc(t)+'</span>'; }).join('');
    var prev = v.notes ? v.notes.substring(0,100) : '';
    html += '<div class="v-card" onclick="openNote(\'' + v.id + '\')">' +
      '<div class="v-thumb">' + (thumb ? '<img src="'+thumb+'" loading="lazy">' : '') + '</div>' +
      '<div class="v-title">' + esc(v.title) + '</div>' +
      '<div class="v-meta"><span class="v-ch">' + esc(ch?ch.name:'') + '</span><span class="v-date">' + fmtDate(v.createdAt) + '</span></div>' +
      (tags ? '<div class="tags">' + tags + '</div>' : '') +
      (prev ? '<div class="v-preview">' + esc(prev) + '</div>' : '') +
    '</div>';
  });
  document.getElementById('v-grid').innerHTML = html;
}

// CHANNEL MODAL
function openChModal() {
  document.getElementById('ch-input').value = '';
  openM('ch-modal');
  setTimeout(function(){ document.getElementById('ch-input').focus(); }, 300);
}

document.getElementById('ch-save-btn').onclick = function() {
  var name = document.getElementById('ch-input').value.trim();
  if (!name) { toast('İsim gir'); return; }
  toast('Kaydediliyor...');
  db.collection('channels').add({ name: name, createdAt: new Date() })
    .then(function(ref) {
      channels.push({ id: ref.id, name: name });
      channels.sort(function(a,b){ return a.name.localeCompare(b.name); });
      closeM('ch-modal');
      renderChannels();
      toast('Bölüm eklendi ✓');
    })
    .catch(function(e) { toast('Hata: ' + e.message); });
};

function delChannel(id) {
  if (!confirm('Sil?')) return;
  db.collection('channels').doc(id).delete().then(function() {
    channels = channels.filter(function(c){ return c.id !== id; });
    renderChannels();
    toast('Silindi');
  }).catch(function(e){ toast('Hata: '+e.message); });
}

// VIDEO MODAL
function openVideoModal(vidId) {
  var v = vidId ? videos.find(function(x){ return x.id===vidId; }) : null;
  document.getElementById('vm-title').textContent = v ? 'Düzenle' : 'Video Ekle';
  document.getElementById('v-name').value = v ? v.title : '';
  document.getElementById('v-url').value = v ? (v.url||'') : '';
  document.getElementById('v-tags-in').value = v ? (v.tags||[]).join(', ') : '';
  var sel = document.getElementById('v-ch-sel');
  sel.innerHTML = channels.map(function(c){
    return '<option value="'+c.id+'"'+(( v ? v.channelId : activeCh)===c.id?' selected':'')+'>'+esc(c.name)+'</option>';
  }).join('');
  sel.dataset.eid = vidId || '';
  openM('v-modal');
  setTimeout(function(){ document.getElementById('v-name').focus(); }, 300);
}

document.getElementById('v-save-btn').onclick = function() {
  var title = document.getElementById('v-name').value.trim();
  var chId = document.getElementById('v-ch-sel').value;
  var url = document.getElementById('v-url').value.trim();
  var tags = document.getElementById('v-tags-in').value.split(',').map(function(t){ return t.trim(); }).filter(Boolean);
  var eid = document.getElementById('v-ch-sel').dataset.eid;
  if (!title) { toast('Başlık gir'); return; }
  if (!chId) { toast('Bölüm seç'); return; }
  var data = { title:title, channelId:chId, url:url, tags:tags, updatedAt:new Date() };
  toast('Kaydediliyor...');
  if (eid) {
    db.collection('videos').doc(eid).update(data).then(function() {
      var idx = videos.findIndex(function(v){ return v.id===eid; });
      if (idx>-1) videos[idx] = Object.assign(videos[idx], data);
      closeM('v-modal');
      renderVideos();
      toast('Güncellendi ✓');
    }).catch(function(e){ toast('Hata: '+e.message); });
  } else {
    data.createdAt = new Date(); data.notes = ''; data.images = [];
    db.collection('videos').add(data).then(function(ref) {
      videos.unshift(Object.assign({id:ref.id}, data));
      closeM('v-modal');
      renderChannels();
      renderVideos();
      toast('Video eklendi ✓');
    }).catch(function(e){ toast('Hata: '+e.message); });
  }
};

// NOTE
function openNote(id) {
  var v = videos.find(function(x){ return x.id===id; });
  if (!v) return;
  curVid = id;
  curImgs = (v.images||[]).map(function(i){ return Object.assign({},i); });
  var ch = channels.find(function(c){ return c.id===v.channelId; });
  document.getElementById('nm-title').textContent = v.title;
  document.getElementById('nm-ch').textContent = ch ? ch.name : '';
  document.getElementById('nm-tags').innerHTML = (v.tags||[]).map(function(t){ return '<span class="tag">'+esc(t)+'</span>'; }).join('');
  document.getElementById('nm-text').value = v.notes||'';
  renderNoteImgs();
  openM('note-modal');
}

document.getElementById('nm-edit-btn').onclick = function() {
  closeM('note-modal'); openVideoModal(curVid);
};
document.getElementById('nm-del-btn').onclick = function() {
  if (!confirm('Sil?')) return;
  db.collection('videos').doc(curVid).delete().then(function() {
    videos = videos.filter(function(x){ return x.id!==curVid; });
    closeM('note-modal'); renderChannels(); renderVideos();
    toast('Silindi');
  }).catch(function(e){ toast('Hata: '+e.message); });
};

function renderNoteImgs() {
  var html = curImgs.map(function(img,i){
    return '<div class="img-wrap"><img src="'+img.url+'" onclick="openLb(\''+img.url+'\')"><button class="img-del" onclick="removeImg('+i+')">✕</button></div>';
  }).join('');
  document.getElementById('nm-imgs').innerHTML = html;
}

function removeImg(i) {
  curImgs.splice(i,1); renderNoteImgs(); saveNote();
}

function addImgs(input) {
  var files = Array.from(input.files);
  if (!files.length) return;
  var done = 0;
  toast('Ekleniyor...');
  files.forEach(function(f) {
    readImg(f, function() {
      done++;
      if (done === files.length) { renderNoteImgs(); saveNote(); toast('Görsel eklendi ✓'); }
    });
  });
  input.value = '';
}

function readImg(file, cb) {
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      var MAX=1200, w=img.width, h=img.height;
      if (w>MAX||h>MAX) { if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;} }
      var c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      curImgs.push({ url: c.toDataURL('image/jpeg', 0.75) });
      if (cb) cb();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

document.addEventListener('paste', function(e) {
  if (!document.getElementById('note-modal').classList.contains('open')) return;
  var items = Array.from(e.clipboardData.items).filter(function(i){ return i.type.startsWith('image/'); });
  if (!items.length) return;
  toast('Yapıştırılıyor...');
  var done = 0;
  items.forEach(function(item) {
    readImg(item.getAsFile(), function() {
      done++;
      if (done===items.length) { renderNoteImgs(); saveNote(); toast('Görsel eklendi ✓'); }
    });
  });
});

function schedSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveNote, 1200);
}

function saveNote() {
  if (!curVid) return;
  var notes = document.getElementById('nm-text').value;
  var images = curImgs.map(function(i){ return {url:i.url}; });
  db.collection('videos').doc(curVid).update({notes:notes, images:images}).then(function() {
    var v = videos.find(function(x){ return x.id===curVid; });
    if (v) { v.notes=notes; v.images=images; }
  }).catch(function(e){ toast('Kayıt hatası: '+e.message); });
}

// SEARCH
function doSearch(q) {
  q = q.trim().toLowerCase();
  if (!q) { renderVideos(); return; }
  var res = videos.filter(function(v) {
    return v.channelId===activeCh && (
      v.title.toLowerCase().includes(q) ||
      (v.notes||'').toLowerCase().includes(q) ||
      (v.tags||[]).some(function(t){ return t.toLowerCase().includes(q); })
    );
  });
  renderVideos(res);
}

// SETTINGS
function openSettings() { buildColors(); openM('s-modal'); }
function setTheme(t) { document.body.classList.toggle('light', t==='light'); localStorage.setItem('tn-theme',t); }
function setAccent(c) { document.documentElement.style.setProperty('--accent',c); localStorage.setItem('tn-accent',c); buildColors(); }
function buildColors() {
  var cur = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
  document.getElementById('color-row').innerHTML = COLORS.map(function(c) {
    return '<div class="cdot'+(cur===c?' sel':'')+'" style="background:'+c+'" onclick="setAccent(\''+c+'\')"></div>';
  }).join('');
}
function applySettings() {
  var t=localStorage.getItem('tn-theme'); if(t) setTheme(t);
  var a=localStorage.getItem('tn-accent'); if(a) document.documentElement.style.setProperty('--accent',a);
}

// LIGHTBOX
function openLb(url) { document.getElementById('lb-img').src=url; document.getElementById('lb').classList.add('open'); }
function closeLb() { document.getElementById('lb').classList.remove('open'); }

// MODALS
function openM(id) { document.getElementById(id).classList.add('open'); }
function closeM(id) {
  document.getElementById(id).classList.remove('open');
  if (id==='note-modal') { clearTimeout(saveTimer); saveNote(); if(activeCh) renderVideos(); }
}
document.querySelectorAll('.modal-bg').forEach(function(bg) {
  bg.addEventListener('click', function(e) { if(e.target===bg) closeM(bg.id); });
});
document.addEventListener('keydown', function(e) {
  if (e.key==='Escape') {
    document.querySelectorAll('.modal-bg.open').forEach(function(m){ closeM(m.id); });
    closeLb();
  }
});

// UTILS
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function ytThumb(url) { if(!url) return null; var m=url.match(/(?:v=|youtu\.be\/)([A-Za-z0-9_-]{11})/); return m?'https://img.youtube.com/vi/'+m[1]+'/mqdefault.jpg':null; }
function fmtDate(ts) { if(!ts) return ''; var d=ts.toDate?ts.toDate():new Date(ts); return d.toLocaleDateString('tr-TR',{day:'numeric',month:'short'}); }
function toast(msg, dur) {
  dur = dur||2400;
  var el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(function(){ el.classList.remove('show'); }, dur);
}

// BOOT
window.onload = function() {
  if (tryAutoInit()) { startApp(); }
};
</script>
