<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeNotes</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
:root {
  --bg:#0e0e0e; --surface:#171717; --surface2:#1f1f1f; --border:#2a2a2a;
  --accent:#c8a96e; --text:#e8e8e8; --muted:#666; --danger:#c0392b;
  --radius:10px; --font:'Inter',system-ui,sans-serif; --mono:'JetBrains Mono',monospace;
}
.light { --bg:#f5f5f0; --surface:#fff; --surface2:#efefea; --border:#ddd; --text:#111; --muted:#999; }
* { box-sizing:border-box; margin:0; padding:0; }
body { background:var(--bg); color:var(--text); font-family:var(--font); min-height:100vh; }

/* SETUP */
#setup-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:24px; gap:20px; }
#setup-screen h1 { font-size:2rem; color:var(--accent); letter-spacing:-1px; }
#setup-screen p { color:var(--muted); font-size:.9rem; text-align:center; max-width:360px; }
.setup-box { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:28px; width:100%; max-width:420px; display:flex; flex-direction:column; gap:14px; }
.setup-box label { font-size:.8rem; color:var(--muted); margin-bottom:2px; display:block; }
.setup-box input { width:100%; background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:10px 12px; border-radius:6px; font-size:.85rem; font-family:var(--mono); }
.setup-box input:focus { outline:none; border-color:var(--accent); }

/* TOPBAR */
#topbar { display:flex; align-items:center; justify-content:space-between; padding:0 16px; height:52px; background:var(--surface); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; gap:12px; }
.topbar-left { display:flex; align-items:center; gap:10px; flex-shrink:0; }
.logo { font-size:1rem; font-weight:700; color:var(--accent); letter-spacing:-.5px; white-space:nowrap; }
.back-btn { background:none; border:none; color:var(--accent); cursor:pointer; font-size:.85rem; display:none; align-items:center; gap:4px; padding:4px 0; }
.back-btn.show { display:flex; }
.topbar-right { display:flex; align-items:center; gap:8px; }
.search-wrap { position:relative; display:flex; align-items:center; flex:1; min-width:0; }
.search-wrap input { background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:7px 12px 7px 32px; border-radius:20px; font-size:.83rem; width:100%; min-width:0; }
.search-wrap input:focus { outline:none; border-color:var(--accent); }
.search-wrap svg { position:absolute; left:10px; width:14px; height:14px; color:var(--muted); pointer-events:none; }
.icon-btn { background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:6px 10px; border-radius:6px; cursor:pointer; font-size:.8rem; display:flex; align-items:center; gap:5px; white-space:nowrap; flex-shrink:0; }
.icon-btn:hover { border-color:var(--accent); color:var(--accent); }
.icon-btn svg { width:15px; height:15px; }

/* VIEWS */
#view-channels, #view-videos { padding:20px 16px; }

/* CHANNEL GRID */
#channels-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:12px; margin-top:16px; }
.channel-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px 16px; cursor:pointer; transition:border-color .15s,transform .1s; position:relative; }
.channel-card:hover { border-color:var(--accent); transform:translateY(-1px); }
.channel-card .cc-name { font-size:1rem; font-weight:700; margin-bottom:6px; }
.channel-card .cc-count { font-size:.75rem; color:var(--muted); }
.channel-card .cc-del { position:absolute; top:8px; right:8px; background:none; border:none; color:var(--muted); cursor:pointer; font-size:.85rem; opacity:0; }
.channel-card:hover .cc-del { opacity:1; }
.channel-card .cc-del:hover { color:var(--danger); }
.add-channel-card { background:transparent; border:2px dashed var(--border); border-radius:var(--radius); padding:20px 16px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; color:var(--muted); font-size:.88rem; transition:border-color .15s,color .15s; }
.add-channel-card:hover { border-color:var(--accent); color:var(--accent); }

/* VIDEO GRID */
.view-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:10px; }
.view-header h2 { font-size:1.1rem; font-weight:700; }
.view-header .sub { font-size:.8rem; color:var(--muted); margin-top:2px; }
#videos-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:12px; }
.video-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px; cursor:pointer; transition:border-color .15s,transform .1s; display:flex; flex-direction:column; gap:8px; }
.video-card:hover { border-color:var(--accent); transform:translateY(-1px); }
.video-thumb { width:100%; height:110px; border-radius:6px; background:var(--surface2); display:flex; align-items:center; justify-content:center; overflow:hidden; }
.video-thumb img { width:100%; height:100%; object-fit:cover; border-radius:6px; }
.video-title { font-size:.88rem; font-weight:600; line-height:1.3; }
.video-meta { display:flex; justify-content:space-between; }
.video-channel { font-size:.72rem; color:var(--accent); }
.video-date { font-size:.72rem; color:var(--muted); }
.video-tags { display:flex; flex-wrap:wrap; gap:4px; }
.tag { font-size:.65rem; padding:2px 7px; border-radius:10px; background:var(--surface2); color:var(--muted); border:1px solid var(--border); }
.video-preview { font-size:.76rem; color:var(--muted); line-height:1.4; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
.card-img-preview { display:flex; gap:4px; }
.card-img-preview img { width:38px; height:38px; object-fit:cover; border-radius:4px; border:1px solid var(--border); }
.card-img-more { width:38px; height:38px; border-radius:4px; background:var(--surface2); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:.68rem; color:var(--muted); }

/* EMPTY */
.empty { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 20px; gap:12px; color:var(--muted); }
.empty svg { width:44px; height:44px; opacity:.25; }
.empty p { font-size:.88rem; }

/* MODAL */
.modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:200; align-items:center; justify-content:center; padding:16px; }
.modal-bg.open { display:flex; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); width:100%; max-width:640px; max-height:90vh; overflow-y:auto; display:flex; flex-direction:column; }
.modal-head { padding:16px 20px 12px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; background:var(--surface); z-index:1; }
.modal-head h3 { font-size:.95rem; font-weight:700; }
.modal-close { background:none; border:none; color:var(--muted); font-size:1.4rem; cursor:pointer; }
.modal-close:hover { color:var(--text); }
.modal-body { padding:18px 20px; display:flex; flex-direction:column; gap:14px; }
.field label { font-size:.75rem; color:var(--muted); margin-bottom:4px; display:block; }
.field input,.field textarea,.field select { width:100%; background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:9px 12px; border-radius:6px; font-size:.86rem; font-family:var(--font); }
.field textarea { resize:vertical; }
.field input:focus,.field textarea:focus,.field select:focus { outline:none; border-color:var(--accent); }
.modal-footer { padding:12px 20px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:10px; }

/* NOTE MODAL */
.note-images-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); gap:8px; }
.note-img-wrap { position:relative; border-radius:6px; overflow:hidden; }
.note-img-wrap img { width:100%; height:90px; object-fit:cover; display:block; cursor:zoom-in; }
.note-img-del { position:absolute; top:4px; right:4px; background:rgba(0,0,0,.65); border:none; color:#fff; border-radius:50%; width:20px; height:20px; font-size:.7rem; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.img-upload-area { border:2px dashed var(--border); border-radius:6px; padding:14px; text-align:center; cursor:pointer; color:var(--muted); font-size:.8rem; transition:border-color .15s; display:block; }
.img-upload-area:hover { border-color:var(--accent); color:var(--accent); }
.img-upload-area input { display:none; }
.note-text-area { width:100%; background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:12px; border-radius:6px; font-size:.86rem; font-family:var(--font); resize:vertical; min-height:160px; }
.note-text-area:focus { outline:none; border-color:var(--accent); }
.section-label { font-size:.72rem; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--muted); }

/* LIGHTBOX */
#lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,.93); z-index:500; align-items:center; justify-content:center; }
#lightbox.open { display:flex; }
#lightbox img { max-width:95vw; max-height:95vh; border-radius:8px; }
#lightbox-close { position:fixed; top:16px; right:20px; background:none; border:none; color:#fff; font-size:2rem; cursor:pointer; }

/* BUTTONS */
.btn { padding:8px 16px; border-radius:6px; font-size:.83rem; font-weight:600; cursor:pointer; border:none; transition:opacity .15s; }
.btn:hover { opacity:.85; }
.btn-primary { background:var(--accent); color:#111; }
.btn-ghost { background:var(--surface2); border:1px solid var(--border); color:var(--text); }
.btn-danger { background:var(--danger); color:#fff; }
.btn-sm { padding:5px 11px; font-size:.76rem; }

/* TOAST */
#toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--surface); border:1px solid var(--accent); color:var(--text); padding:9px 18px; border-radius:20px; font-size:.82rem; z-index:999; opacity:0; pointer-events:none; transition:opacity .25s; white-space:nowrap; }
#toast.show { opacity:1; }

/* SETTINGS */
.color-row { display:flex; flex-wrap:wrap; gap:8px; margin-top:6px; }
.color-dot { width:26px; height:26px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:transform .1s; }
.color-dot:hover,.color-dot.sel { transform:scale(1.2); border-color:var(--text); }
.settings-section { border-bottom:1px solid var(--border); padding:14px 0; }
.settings-section:last-child { border-bottom:none; }
.settings-section h4 { font-size:.75rem; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-bottom:10px; }

mark { background:var(--accent); color:#111; border-radius:2px; padding:0 2px; }

@media (max-width:480px) {
  #channels-grid { grid-template-columns:repeat(2,1fr); }
  #videos-grid { grid-template-columns:1fr; }
}
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup-screen">
  <h1>TradeNotes</h1>
  <p>Firebase bilgilerini gir. Bir kez yapılandır — veriler her cihazında senkronize olur.</p>
  <div class="setup-box">
    <div><label>API Key</label><input id="s-apikey" placeholder="AIzaSy..."></div>
    <div><label>Auth Domain</label><input id="s-authdomain" placeholder="xxx.firebaseapp.com"></div>
    <div><label>Project ID</label><input id="s-projectid" placeholder="your-project-id"></div>
    <div><label>App ID</label><input id="s-appid" placeholder="1:xxx:web:xxx"></div>
    <button class="btn btn-primary" onclick="initFirebase()">Bağlan</button>
  </div>
</div>

<!-- APP -->
<div id="app-shell" style="display:none">
  <div id="topbar">
    <div class="topbar-left">
      <button class="back-btn" id="back-btn" onclick="showChannels()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        Bölümler
      </button>
      <span class="logo">TradeNotes</span>
    </div>
    <div class="topbar-right">
      <div class="search-wrap" id="search-wrap" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search-input" placeholder="Not ara..." oninput="handleSearch(this.value)">
      </div>
      <button class="icon-btn" id="add-video-btn" onclick="openAddVideo()" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Video
      </button>
      <button class="icon-btn" onclick="openSettings()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </div>

  <!-- BÖLÜMLER -->
  <div id="view-channels">
    <div class="view-header">
      <div>
        <h2>Bölümler</h2>
        <div class="sub" id="ch-sub"></div>
      </div>
    </div>
    <div id="channels-grid"></div>
  </div>

  <!-- VİDEOLAR -->
  <div id="view-videos" style="display:none">
    <div class="view-header">
      <div>
        <h2 id="videos-title"></h2>
        <div class="sub" id="videos-sub"></div>
      </div>
      <button class="btn btn-primary btn-sm" onclick="openAddVideo()">+ Video Ekle</button>
    </div>
    <div id="videos-grid"></div>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeLightbox()">
  <button id="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="">
</div>
<div id="toast"></div>

<!-- CHANNEL MODAL -->
<div class="modal-bg" id="channel-modal">
  <div class="modal" style="max-width:340px">
    <div class="modal-head"><h3>Bölüm Ekle</h3><button class="modal-close" onclick="closeModal('channel-modal')">✕</button></div>
    <div class="modal-body">
      <div class="field"><label>Bölüm Adı</label><input id="ch-name-input" placeholder="Örn: ICT, SMC Trader..."></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('channel-modal')">İptal</button>
      <button class="btn btn-primary" onclick="saveChannel()">Kaydet</button>
    </div>
  </div>
</div>

<!-- VIDEO MODAL -->
<div class="modal-bg" id="video-modal">
  <div class="modal">
    <div class="modal-head"><h3 id="v-modal-title">Video Ekle</h3><button class="modal-close" onclick="closeModal('video-modal')">✕</button></div>
    <div class="modal-body">
      <div class="field"><label>Video Başlığı *</label><input id="v-title" placeholder="Video adı..."></div>
      <div class="field"><label>Bölüm *</label><select id="v-channel"></select></div>
      <div class="field"><label>YouTube Linki (opsiyonel — thumbnail için)</label><input id="v-url" placeholder="https://youtube.com/watch?v=..."></div>
      <div class="field"><label>Etiketler (virgülle ayır)</label><input id="v-tags" placeholder="SMT, FVG, Entry..."></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('video-modal')">İptal</button>
      <button class="btn btn-primary" onclick="saveVideo()">Kaydet</button>
    </div>
  </div>
</div>

<!-- NOTE MODAL -->
<div class="modal-bg" id="note-modal">
  <div class="modal" style="max-width:700px">
    <div class="modal-head">
      <h3 id="note-modal-title" style="max-width:65%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">—</h3>
      <div style="display:flex;gap:6px;align-items:center">
        <button class="btn btn-ghost btn-sm" onclick="editCurrentVideo()">Düzenle</button>
        <button class="btn btn-danger btn-sm" onclick="deleteCurrentVideo()">Sil</button>
        <button class="modal-close" onclick="closeModal('note-modal')">✕</button>
      </div>
    </div>
    <div class="modal-body">
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        <span id="note-channel-display" style="font-size:.76rem;color:var(--accent);font-weight:600"></span>
        <div id="note-tags-display" style="display:flex;gap:4px;flex-wrap:wrap"></div>
      </div>
      <div>
        <div class="section-label" style="margin-bottom:8px">Görseller</div>
        <div class="note-images-grid" id="note-images-grid"></div>
        <label class="img-upload-area" style="margin-top:8px" id="img-upload-label">
          <input type="file" id="img-file-input" accept="image/*" multiple onchange="handleImageUpload(this)">
          📎 Görsel ekle — galeriden seç veya yapıştır (Ctrl+V)
        </label>
      </div>
      <div>
        <div class="section-label" style="margin-bottom:8px">Notlar</div>
        <textarea class="note-text-area" id="note-text" placeholder="Notlarını buraya yaz..." oninput="autoSaveNote()"></textarea>
      </div>
    </div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-bg" id="settings-modal">
  <div class="modal" style="max-width:360px">
    <div class="modal-head"><h3>Ayarlar</h3><button class="modal-close" onclick="closeModal('settings-modal')">✕</button></div>
    <div class="modal-body">
      <div class="settings-section">
        <h4>Tema</h4>
        <div style="display:flex;gap:10px">
          <button class="btn btn-ghost btn-sm" onclick="setTheme('dark')">🌑 Koyu</button>
          <button class="btn btn-ghost btn-sm" onclick="setTheme('light')">☀️ Açık</button>
        </div>
      </div>
      <div class="settings-section">
        <h4>Vurgu Rengi</h4>
        <div class="color-row" id="accent-colors"></div>
      </div>
      <div class="settings-section">
        <h4>Firebase</h4>
        <button class="btn btn-danger btn-sm" onclick="resetFirebase()">Bağlantıyı Sıfırla</button>
      </div>
    </div>
  </div>
</div>

<script>
let db;
let channels = [], videos = [];
let activeChannel = null;
let currentVideoId = null;
let currentImages = [];
let noteAutoSaveTimer = null;

const ACCENT_COLORS = [
  {name:'Gold',val:'#c8a96e'},{name:'Cyan',val:'#4ec9b0'},{name:'Violet',val:'#9b7fe8'},
  {name:'Coral',val:'#e07b6a'},{name:'Mint',val:'#6abf82'},{name:'Steel',val:'#7ba7c7'},
  {name:'Rose',val:'#d47fa0'},{name:'Amber',val:'#e8a835'},
];

// FIREBASE
function initFirebase() {
  const cfg = {
    apiKey:     document.getElementById('s-apikey').value.trim(),
    authDomain: document.getElementById('s-authdomain').value.trim(),
    projectId:  document.getElementById('s-projectid').value.trim(),
    appId:      document.getElementById('s-appid').value.trim(),
  };
  if (!cfg.apiKey || !cfg.projectId) { toast('API Key ve Project ID zorunlu'); return; }
  try {
    if (!firebase.apps.length) firebase.initializeApp(cfg);
    db = firebase.firestore();
    localStorage.setItem('tn-firebase', JSON.stringify(cfg));
    showApp(); loadData();
  } catch(e) { toast('Hata: ' + e.message); }
}

function autoInitFirebase() {
  const saved = localStorage.getItem('tn-firebase');
  if (!saved) return false;
  try {
    const cfg = JSON.parse(saved);
    if (!firebase.apps.length) firebase.initializeApp(cfg);
    db = firebase.firestore();
    return true;
  } catch(e) { return false; }
}

function resetFirebase() { localStorage.removeItem('tn-firebase'); location.reload(); }

function showApp() {
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('app-shell').style.display = 'block';
  applyStoredSettings();
}

// DATA
async function loadData() {
  try {
    const [chSnap, vSnap] = await Promise.all([
      db.collection('channels').orderBy('name').get(),
      db.collection('videos').orderBy('createdAt','desc').get()
    ]);
    channels = chSnap.docs.map(d => ({id:d.id,...d.data()}));
    videos   = vSnap.docs.map(d => ({id:d.id,...d.data()}));
  } catch(e) {
    // orderBy fails if no index, try without
    try {
      const [chSnap, vSnap] = await Promise.all([
        db.collection('channels').get(),
        db.collection('videos').get()
      ]);
      channels = chSnap.docs.map(d => ({id:d.id,...d.data()})).sort((a,b)=>a.name?.localeCompare(b.name)||0);
      videos   = vSnap.docs.map(d => ({id:d.id,...d.data()}));
    } catch(e2) { toast('Veri yüklenemedi: ' + e2.message); }
  }
  renderChannels();
}

// VIEWS
function showChannels() {
  activeChannel = null;
  document.getElementById('view-channels').style.display = 'block';
  document.getElementById('view-videos').style.display = 'none';
  document.getElementById('back-btn').classList.remove('show');
  document.getElementById('search-wrap').style.display = 'none';
  document.getElementById('add-video-btn').style.display = 'none';
  document.getElementById('search-input').value = '';
  renderChannels();
}

function showVideos(channelId) {
  activeChannel = channelId;
  document.getElementById('view-channels').style.display = 'none';
  document.getElementById('view-videos').style.display = 'block';
  document.getElementById('back-btn').classList.add('show');
  document.getElementById('search-wrap').style.display = 'flex';
  document.getElementById('add-video-btn').style.display = 'flex';
  renderVideos();
}

// CHANNELS
function renderChannels() {
  const grid = document.getElementById('channels-grid');
  document.getElementById('ch-sub').textContent = `${channels.length} bölüm`;
  let html = channels.map(ch => {
    const cnt = videos.filter(v => v.channelId === ch.id).length;
    return `<div class="channel-card" onclick="showVideos('${ch.id}')">
      <button class="cc-del" onclick="event.stopPropagation();deleteChannel('${ch.id}')">✕</button>
      <div class="cc-name">${esc(ch.name)}</div>
      <div class="cc-count">${cnt} video</div>
    </div>`;
  }).join('');
  html += `<div class="add-channel-card" onclick="openAddChannel()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Bölüm Ekle
  </div>`;
  grid.innerHTML = html;
}

// VIDEOS
function renderVideos(list) {
  const ch = channels.find(c => c.id === activeChannel);
  const filtered = list !== undefined ? list : videos.filter(v => v.channelId === activeChannel);
  document.getElementById('videos-title').textContent = ch?.name || '';
  document.getElementById('videos-sub').textContent = `${filtered.length} video`;
  const grid = document.getElementById('videos-grid');
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="m9 8 6 4-6 4V8z"/></svg>
      <p>Henüz video eklenmedi</p></div>`;
    return;
  }
  grid.innerHTML = filtered.map(v => {
    const channel = channels.find(c => c.id === v.channelId);
    const thumb = ytThumb(v.url);
    const tags = (v.tags||[]).slice(0,3).map(t=>`<span class="tag">${esc(t)}</span>`).join('');
    const imgs = v.images||[];
    const imgPrev = imgs.length ? `<div class="card-img-preview">
      ${imgs.slice(0,3).map(i=>`<img src="${i.url}" loading="lazy">`).join('')}
      ${imgs.length>3?`<div class="card-img-more">+${imgs.length-3}</div>`:''}
    </div>` : '';
    const preview = v.notes ? v.notes.substring(0,100) : '';
    return `<div class="video-card" onclick="openNote('${v.id}')">
      <div class="video-thumb">${thumb?`<img src="${thumb}" loading="lazy">`:`<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="m9 8 6 4-6 4V8z"/><rect x="2" y="2" width="20" height="20" rx="3"/></svg>`}</div>
      <div class="video-title">${esc(v.title)}</div>
      <div class="video-meta"><span class="video-channel">${esc(channel?.name||'')}</span><span class="video-date">${fmtDate(v.createdAt)}</span></div>
      ${tags?`<div class="video-tags">${tags}</div>`:''}
      ${imgPrev}
      ${preview?`<div class="video-preview">${esc(preview)}</div>`:''}
    </div>`;
  }).join('');
}

// CHANNEL CRUD
function openAddChannel() {
  document.getElementById('ch-name-input').value = '';
  openModal('channel-modal');
  setTimeout(()=>document.getElementById('ch-name-input').focus(),100);
}

async function saveChannel() {
  const name = document.getElementById('ch-name-input').value.trim();
  if (!name) { toast('Bölüm adı gir'); return; }
  try {
    const ref = await db.collection('channels').add({name, createdAt:new Date()});
    channels.push({id:ref.id, name});
    channels.sort((a,b)=>a.name.localeCompare(b.name));
    closeModal('channel-modal');
    renderChannels();
    toast('Bölüm eklendi ✓');
  } catch(e) { toast('Hata: ' + e.message); }
}

async function deleteChannel(id) {
  if (!confirm('Bu bölümü sil?')) return;
  await db.collection('channels').doc(id).delete();
  channels = channels.filter(c=>c.id!==id);
  renderChannels();
  toast('Bölüm silindi');
}

// VIDEO CRUD
function openAddVideo(videoId) {
  const v = videoId ? videos.find(x=>x.id===videoId) : null;
  document.getElementById('v-modal-title').textContent = v ? 'Videoyu Düzenle' : 'Video Ekle';
  document.getElementById('v-title').value = v?.title||'';
  document.getElementById('v-url').value = v?.url||'';
  document.getElementById('v-tags').value = (v?.tags||[]).join(', ');
  const sel = document.getElementById('v-channel');
  sel.innerHTML = channels.length
    ? channels.map(c=>`<option value="${c.id}" ${(v?.channelId||activeChannel)===c.id?'selected':''}>${esc(c.name)}</option>`).join('')
    : '<option value="">Önce bölüm ekle</option>';
  sel.dataset.editId = videoId||'';
  openModal('video-modal');
  setTimeout(()=>document.getElementById('v-title').focus(),100);
}

async function saveVideo() {
  const title = document.getElementById('v-title').value.trim();
  const channelId = document.getElementById('v-channel').value;
  const url = document.getElementById('v-url').value.trim();
  const tags = document.getElementById('v-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
  const editId = document.getElementById('v-channel').dataset.editId;
  if (!title) { toast('Video başlığı gir'); return; }
  if (!channelId) { toast('Bölüm seç'); return; }
  const data = {title, channelId, url, tags, updatedAt:new Date()};
  if (editId) {
    await db.collection('videos').doc(editId).update(data);
    const idx = videos.findIndex(v=>v.id===editId);
    if (idx>-1) videos[idx] = {...videos[idx],...data};
  } else {
    data.createdAt = new Date(); data.notes = ''; data.images = [];
    const ref = await db.collection('videos').add(data);
    videos.unshift({id:ref.id,...data});
  }
  closeModal('video-modal');
  renderChannels();
  if (activeChannel) renderVideos();
  toast(editId?'Video güncellendi':'Video eklendi');
}

// NOTE
function openNote(id) {
  const v = videos.find(x=>x.id===id);
  if (!v) return;
  currentVideoId = id;
  currentImages = (v.images||[]).map(i=>({...i}));
  document.getElementById('note-modal-title').textContent = v.title;
  document.getElementById('note-channel-display').textContent = channels.find(c=>c.id===v.channelId)?.name||'';
  document.getElementById('note-tags-display').innerHTML = (v.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('');
  document.getElementById('note-text').value = v.notes||'';
  renderNoteImages();
  openModal('note-modal');
}

function renderNoteImages() {
  document.getElementById('note-images-grid').innerHTML = currentImages.map((img,i)=>`
    <div class="note-img-wrap">
      <img src="${img.url}" onclick="openLightbox('${img.url}')" loading="lazy">
      <button class="note-img-del" onclick="removeImage(${i})">✕</button>
    </div>`).join('');
}

async function removeImage(idx) {
  currentImages.splice(idx,1);
  renderNoteImages();
  await persistNote();
}

async function handleImageUpload(input) {
  const files = Array.from(input.files);
  if (!files.length) return;
  toast('Ekleniyor...');
  for (const f of files) await readAndAddImage(f);
  input.value = '';
  renderNoteImages();
  await persistNote();
  toast('Görsel eklendi');
}

function readAndAddImage(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const MAX=1200; let w=img.width,h=img.height;
        if (w>MAX||h>MAX) { if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;} }
        const canvas=document.createElement('canvas'); canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        currentImages.push({url:canvas.toDataURL('image/jpeg',.75)});
        resolve();
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

document.addEventListener('paste', async e => {
  if (!document.getElementById('note-modal').classList.contains('open')) return;
  const items = Array.from(e.clipboardData.items).filter(i=>i.type.startsWith('image/'));
  if (!items.length) return;
  toast('Yapıştırılıyor...');
  for (const item of items) await readAndAddImage(item.getAsFile());
  renderNoteImages(); await persistNote(); toast('Görsel eklendi');
});

const uploadLabel = document.getElementById('img-upload-label');
uploadLabel?.addEventListener('dragover',e=>{e.preventDefault();uploadLabel.style.borderColor='var(--accent)';});
uploadLabel?.addEventListener('dragleave',()=>{uploadLabel.style.borderColor='var(--border)';});
uploadLabel?.addEventListener('drop',async e=>{
  e.preventDefault(); uploadLabel.style.borderColor='var(--border)';
  const files=Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('image/'));
  for (const f of files) await readAndAddImage(f);
  if (files.length) { renderNoteImages(); await persistNote(); toast('Görsel eklendi'); }
});

function autoSaveNote() {
  clearTimeout(noteAutoSaveTimer);
  noteAutoSaveTimer = setTimeout(persistNote, 1200);
}

async function persistNote() {
  if (!currentVideoId) return;
  const notes = document.getElementById('note-text').value;
  const images = currentImages.map(i=>({url:i.url}));
  try {
    await db.collection('videos').doc(currentVideoId).update({notes, images});
    const v = videos.find(x=>x.id===currentVideoId);
    if (v) { v.notes=notes; v.images=images; }
  } catch(e) { toast('Kayıt hatası'); }
}

function editCurrentVideo() { closeModal('note-modal'); openAddVideo(currentVideoId); }

async function deleteCurrentVideo() {
  if (!confirm('Bu videoyu sil?')) return;
  await db.collection('videos').doc(currentVideoId).delete();
  videos = videos.filter(x=>x.id!==currentVideoId);
  closeModal('note-modal');
  renderChannels();
  if (activeChannel) renderVideos();
  toast('Video silindi');
}

// SEARCH
function handleSearch(query) {
  query = query.trim().toLowerCase();
  if (!query) { renderVideos(); return; }
  const results = videos.filter(v =>
    v.channelId === activeChannel &&
    (v.title.toLowerCase().includes(query) ||
    (v.notes||'').toLowerCase().includes(query) ||
    (v.tags||[]).some(t=>t.toLowerCase().includes(query)))
  );
  document.getElementById('videos-sub').textContent = `${results.length} sonuç`;
  const grid = document.getElementById('videos-grid');
  if (!results.length) { grid.innerHTML=`<div class="empty" style="grid-column:1/-1"><p>Sonuç bulunamadı</p></div>`; return; }
  grid.innerHTML = results.map(v => {
    const channel = channels.find(c=>c.id===v.channelId);
    const thumb = ytThumb(v.url);
    const tags = (v.tags||[]).slice(0,3).map(t=>`<span class="tag">${esc(t)}</span>`).join('');
    const snippet = getSnippet(v.notes||'', query);
    return `<div class="video-card" onclick="openNote('${v.id}')">
      <div class="video-thumb">${thumb?`<img src="${thumb}" loading="lazy">`:`<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="m9 8 6 4-6 4V8z"/><rect x="2" y="2" width="20" height="20" rx="3"/></svg>`}</div>
      <div class="video-title">${highlight(esc(v.title),query)}</div>
      <div class="video-meta"><span class="video-channel">${esc(channel?.name||'')}</span><span class="video-date">${fmtDate(v.createdAt)}</span></div>
      ${tags?`<div class="video-tags">${tags}</div>`:''}
      ${snippet?`<div class="video-preview">${highlight(esc(snippet),query)}</div>`:''}
    </div>`;
  }).join('');
}

function getSnippet(text, q) {
  const idx=text.toLowerCase().indexOf(q);
  if (idx===-1) return text.substring(0,100);
  const start=Math.max(0,idx-30);
  return (start>0?'…':'')+text.substring(start,idx+q.length+60)+'…';
}
function highlight(text,q) {
  if (!q) return text;
  return text.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'), '<mark>$1</mark>');
}

// SETTINGS
function openSettings() { buildAccentPicker(); openModal('settings-modal'); }
function setTheme(t) { document.body.classList.toggle('light',t==='light'); localStorage.setItem('tn-theme',t); }
function setAccent(hex) {
  document.documentElement.style.setProperty('--accent',hex);
  localStorage.setItem('tn-accent',hex);
  buildAccentPicker();
}
function buildAccentPicker() {
  const cur=getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
  document.getElementById('accent-colors').innerHTML=ACCENT_COLORS.map(c=>
    `<div class="color-dot ${cur===c.val?'sel':''}" style="background:${c.val}" title="${c.name}" onclick="setAccent('${c.val}')"></div>`
  ).join('');
}
function applyStoredSettings() {
  const theme=localStorage.getItem('tn-theme'); if (theme) setTheme(theme);
  const accent=localStorage.getItem('tn-accent');
  if (accent) document.documentElement.style.setProperty('--accent',accent);
}

// LIGHTBOX
function openLightbox(url) { document.getElementById('lightbox-img').src=url; document.getElementById('lightbox').classList.add('open'); }
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }

// MODALS
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  if (id==='note-modal') { clearTimeout(noteAutoSaveTimer); persistNote(); if(activeChannel) renderVideos(); }
}
document.querySelectorAll('.modal-bg').forEach(bg=>{
  bg.addEventListener('click',e=>{ if(e.target===bg) closeModal(bg.id); });
});

// UTILS
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function ytThumb(url) { if(!url) return null; const m=url.match(/(?:v=|youtu\.be\/)([A-Za-z0-9_-]{11})/); return m?`https://img.youtube.com/vi/${m[1]}/mqdefault.jpg`:null; }
function fmtDate(ts) { if(!ts) return ''; const d=ts.toDate?ts.toDate():new Date(ts); return d.toLocaleDateString('tr-TR',{day:'numeric',month:'short'}); }
function toast(msg,dur=2400) { const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),dur); }

document.addEventListener('keydown',e=>{
  if(e.key==='Escape') { document.querySelectorAll('.modal-bg.open').forEach(m=>closeModal(m.id)); closeLightbox(); }
});

window.addEventListener('DOMContentLoaded',()=>{
  if(autoInitFirebase()) { showApp(); loadData(); }
});
</script>
